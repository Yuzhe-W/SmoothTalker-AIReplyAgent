services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: replycopilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: replycopilot
      POSTGRES_USER: replycopilot
      POSTGRES_PASSWORD: replycopilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U replycopilot -d replycopilot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
